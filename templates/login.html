{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<section class="auth-wrap">
  <div class="card card-glass max-420">
    <h1 class="h2">Welcome back</h1>
    <p class="muted">Login to continue</p>
    <form method="post" action="{{ url_for('login_post') }}" class="form-grid">
      <label>
        <span>Username</span>
        <input name="username" required autocomplete="username" />
      </label>
      <label>
        <span>Password</span>
        <input name="password" type="password" required autocomplete="current-password" />
      </label>
      <button class="btn w-100" type="submit">Login</button>
      <p class="muted center">No account?
        <a href="{{ url_for('register') }}">Register</a>
      </p>
    </form>
  </div>
</section>
{% endblock %}
