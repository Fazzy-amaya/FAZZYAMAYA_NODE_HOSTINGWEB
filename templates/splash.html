<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FAZZYAMAYA HOSTING</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a2a4a;  /* deep blue */
            background-image: radial-gradient(circle at 10% 20%, rgba(0,0,0,0.2) 2%, transparent 3%),
                              radial-gradient(circle at 80% 40%, rgba(0,0,0,0.3) 3%, transparent 4%),
                              repeating-linear-gradient(45deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 2px, transparent 2px, transparent 8px);
            background-size: 30px 30px, 40px 40px, auto;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            font-family: 'Creepster', 'Metal', 'Courier New', monospace;
            padding: 20px;
        }
        /* Blood drip effect (now darker red) */
        body::before {
            content: '';
            position: absolute;
            top: -50px;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, 
                rgba(100,0,0,0.6) 0px,
                rgba(100,0,0,0.6) 2px,
                transparent 2px,
                transparent 8px);
            pointer-events: none;
            z-index: 1;
        }
        body::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: radial-gradient(ellipse at 50% 100%, rgba(0,0,0,0.3) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }
        /* Blood drips */
        .drip {
            position: absolute;
            width: 8px;
            height: 20px;
            background: #6a0000;
            border-radius: 50%;
            filter: blur(2px);
            animation: drip 2s infinite;
            z-index: 2;
        }
        @keyframes drip {
            0% { top: -20px; opacity: 0; transform: scaleY(0.5); }
            20% { opacity: 0.8; transform: scaleY(1); }
            80% { top: 90vh; opacity: 0.5; transform: scaleY(1); }
            100% { top: 95vh; opacity: 0; transform: scaleY(0.2); }
        }
        /* Container */
        .splash-container {
            text-align: center;
            position: relative;
            z-index: 10;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
            padding: 20px 30px;
            border-radius: 8px;
            border: 1px solid rgba(255,0,0,0.3);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            max-width: 90vw;
        }
        /* Sharp-edged text – responsive */
        .title {
            font-size: clamp(1.8rem, 8vw, 4rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #ff3333;
            text-shadow: 2px 2px 0 #4a0000, 4px 4px 0 #2a0000;
            position: relative;
            display: inline-block;
            padding: 10px 15px;
            background: linear-gradient(135deg, #7a0000, #3a0000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: none;
            -webkit-text-stroke: 1px #ff0000;
            text-stroke: 1px #ff0000;
            white-space: normal;
            word-break: break-word;
        }
        /* Blood stains overlay – scaled with text */
        .title::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="%23aa0000" opacity="0.4" d="M20,30 Q30,10 40,20 Q50,30 60,25 Q70,20 80,30 Q85,40 80,50 Q75,60 70,70 Q65,80 55,75 Q45,70 35,72 Q25,74 22,62 Q19,50 20,30z"/><path fill="%23880000" opacity="0.3" d="M70,40 Q78,35 85,42 Q92,50 85,58 Q78,65 70,62 Q65,60 67,52 Q69,44 70,40z"/></svg>') no-repeat center;
            background-size: contain;
            opacity: 0.4;
            pointer-events: none;
            mix-blend-mode: multiply;
        }
        /* Loading dots */
        .loading {
            margin-top: 20px;
            font-size: clamp(1.2rem, 5vw, 2rem);
            letter-spacing: 0.2em;
            color: #ff6666;
            text-shadow: 0 0 5px #ff0000;
        }
        .loading span {
            display: inline-block;
            animation: bounce 1.2s infinite;
        }
        .loading span:nth-child(1) { animation-delay: 0s; }
        .loading span:nth-child(2) { animation-delay: 0.2s; }
        .loading span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(1); opacity: 0.5; }
            40% { transform: scale(1.5); opacity: 1; }
        }

        /* Additional responsiveness for very small screens */
        @media (max-width: 480px) {
            .splash-container {
                padding: 15px 20px;
            }
            .title {
                letter-spacing: 0.05em;
            }
            .loading {
                margin-top: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="title">FAZZYAMAYA HOSTING WEB</div>
        <div class="loading">
            <span>●</span><span>●</span><span>●</span>
        </div>
    </div>

    <script>
        // Generate random blood drips
        for (let i = 0; i < 30; i++) {
            let drip = document.createElement('div');
            drip.className = 'drip';
            let left = Math.random() * 100;
            let delay = Math.random() * 5;
            let duration = 1 + Math.random() * 2;
            drip.style.left = left + '%';
            drip.style.animationDelay = delay + 's';
            drip.style.animationDuration = duration + 's';
            document.body.appendChild(drip);
        }
        // Redirect after 4 seconds
        setTimeout(() => {
            window.location.href = "{{ url_for('login') }}";
        }, 4000);
    </script>
</body>
</html>
